name: Version

on:
    push:
        branches: [main]
        paths:
            - 'change/**'

    workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
    version:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Check for change files
              id: check
              uses: ./.github/actions/check-change-files

            - run: pnpm -r build
              if: steps.check.outputs.has == 'true'

            - name: Bump and write manifest
              id: bump
              if: steps.check.outputs.has == 'true'
              uses: ./.github/actions/bump-and-manifest

            - uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'chore: cleanup bumped manifest [skip ci]'
                  title: 'chore: cleanup bumped manifest'
                  body: 'Removes .bumped after successful publish.'
                  branch: cleanup-bumped
                  base: main
                  delete-branch: true
                  labels: cleanup