name: Version

on:
  push:
    branches: [main]
    paths:
      - 'change/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for change files
        id: check
        shell: pwsh
        run: |
          $files = Get-ChildItem "change/*.json" -ErrorAction SilentlyContinue
          if ($files.Count -gt 0) { "has=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append } else { "has=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append }

      - run: pnpm build
        if: steps.check.outputs.has == 'true'

      - run: npx beachball bump --yes
        if: steps.check.outputs.has == 'true'

      - uses: peter-evans/create-pull-request@v7
        if: steps.check.outputs.has == 'true'
        with:
          commit-message: "chore: version packages"
          title: "chore: version packages"
          body: |
            This PR is automatically generated by beachball.
            It bumps package versions, updates changelogs, and removes change files.
          branch: version-packages
          base: main
          labels: version
