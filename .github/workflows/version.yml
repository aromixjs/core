name: Version

on:
  push:
    branches: [main]
    paths:
      - 'change/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    if: hashFiles('change/**') != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: npx beachball bump --yes

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: version packages"
          title: "chore: version packages"
          body: |
            This PR is automatically generated by beachball.
            It bumps package versions, updates changelogs, and removes change files.
          branch: version-packages
          base: main
          labels: version
