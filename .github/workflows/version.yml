name: Version

on:
  push:
    branches: [main]
    paths:
      - 'change/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for change files
        id: check
        run: |
          count=$(ls change/*.json 2>/dev/null | wc -l)
          [ "$count" -gt 0 ] && echo "has=true" || echo "has=false" >> "$GITHUB_OUTPUT"

      - run: pnpm --filter @aromix/core build
        if: steps.check.outputs.has == 'true'
      - run: pnpm --filter @aromix/bun build
        if: steps.check.outputs.has == 'true'
      - run: pnpm --filter @aromix/cloudflare build
        if: steps.check.outputs.has == 'true'
      - run: pnpm --filter @aromix/cli build
        if: steps.check.outputs.has == 'true'

      - name: Bump and write manifest
        if: steps.check.outputs.has == 'true'
        run: |
          npx beachball bump --yes
          # Build manifest of bumped packages from git diff
          echo '{"packages":[]}' > .bumped.json
          for pkg_json in packages/*/package.json; do
            if git diff HEAD -- "$pkg_json" | grep -q '"version"'; then
              name=$(jq -r '.name' "$pkg_json")
              version=$(jq -r '.version' "$pkg_json")
              jq --arg n "$name" --arg v "$version" '.packages += [{"name":$n,"version":$v}]' .bumped.json > /tmp/bumped.json
              mv /tmp/bumped.json .bumped.json
            fi
          done

      - uses: peter-evans/create-pull-request@v7
        if: steps.check.outputs.has == 'true'
        with:
          commit-message: "chore: version packages"
          title: "chore: version packages"
          body: |
            This PR was generated by beachball.
            It bumps package versions, generates changelogs, and removes change files.
          branch: version-packages
          base: main
          labels: version
