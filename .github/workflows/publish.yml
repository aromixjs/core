name: Publish

on:
      push:
            branches: [main]
            paths:
                  - 'packages/**/package.json'
                  - 'packages/**/CHANGELOG.json'

permissions:
      contents: write
      id-token: write

jobs:
      publish:
            runs-on: ubuntu-latest
            steps:
                  - uses: actions/checkout@v4

                  - uses: pnpm/action-setup@v4

                  - uses: actions/setup-node@v4
                    with:
                          node-version: 22
                          registry-url: 'https://registry.npmjs.org'
                          cache: pnpm

                  - run: pnpm install --frozen-lockfile

                  - name: Verify version merge
                    id: check
                    run: |
                          message=$(git log -1 --pretty=%B)
                          count=$(ls change/*.json 2>/dev/null | wc -l)

                          if [[ "$message" == "chore: version packages"* ]] && [ "$count" -eq 0 ]; then
                            echo "ready=true" >> "$GITHUB_OUTPUT"
                          else
                            echo "ready=false" >> "$GITHUB_OUTPUT"
                          fi
                  - run: pnpm --filter @aromix/core build
                    if: steps.check.outputs.ready == 'true'
                  - run: pnpm --filter @aromix/bun build
                    if: steps.check.outputs.ready == 'true'
                  - run: pnpm --filter @aromix/cloudflare build
                    if: steps.check.outputs.ready == 'true'
                  - run: pnpm --filter @aromix/cli build
                    if: steps.check.outputs.ready == 'true'
                    
                  - name: Read core version
                    if: steps.check.outputs.ready == 'true'
                    id: version
                    run: |
                          version=$(jq -r '.version' packages/core/package.json)
                          echo "version=$version" >> "$GITHUB_OUTPUT"

                  - name: Publish to npm
                    if: steps.check.outputs.ready == 'true'
                    run: npx beachball publish --yes --access public --token ${{ secrets.NPM_TOKEN }}
                    env:
                          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

                  - name: Create GitHub Release
                    if: steps.check.outputs.ready == 'true'
                    uses: softprops/action-gh-release@v2
                    with:
                          tag_name: v${{ steps.version.outputs.version }}
                          generate_release_notes: true
