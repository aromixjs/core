name: Publish

on:
  push:
    branches: [main]
    paths:
      - '.bumped.json'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build bumped packages
        run: |
          jq -r '.packages[].name' .bumped.json | while read pkg; do
            pnpm --filter "$pkg" build
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          jq -c '.packages[]' .bumped.json | while read pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            if npm view "$name@$version" version 2>/dev/null; then
              echo "✓ $name@$version already published"
            else
              echo "→ Publishing $name@$version..."
              pnpm --filter "$name" publish --access public --no-git-checks
            fi
          done
