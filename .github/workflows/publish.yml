name: Publish

on:
    push:
        branches: [main]
        paths:
            - '.bumped'
    workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: write
    id-token: write
    pull-requests: write
jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: 'https://registry.npmjs.org'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - uses: ./.github/actions/publish-bumped
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Remove .bumped
              run: git rm .bumped

            - uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GH_PAT }}
                  commit-message: 'chore: cleanup bumped manifest [skip ci]'
                  title: 'chore: cleanup bumped manifest'
                  body: 'Removes .bumped after successful publish.'
                  branch: cleanup-bumped
                  base: main
                  delete-branch: true
                  labels: cleanup
