<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Room</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
.chat-container { max-width: 700px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100vh; }
header { padding: 16px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 18px; color: #e94560; }
#status { font-size: 13px; color: #888; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
.msg.system { background: #16213e; color: #888; align-self: center; font-size: 13px; }
.msg.me { background: #0f3460; align-self: flex-end; }
.msg.other { background: #16213e; align-self: flex-start; }
.msg .author { font-weight: bold; color: #e94560; font-size: 13px; margin-bottom: 4px; }
.msg .time { font-size: 11px; color: #666; margin-top: 4px; text-align: right; }
.input-area { padding: 16px; background: #16213e; display: flex; gap: 8px; }
.input-area input { flex: 1; padding: 12px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #e94560; }
.input-area button { padding: 12px 24px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.input-area button:hover { background: #c73650; }
#login { position: fixed; inset: 0; background: rgba(26,26,46,.95); display: flex; align-items: center; justify-content: center; z-index: 10; }
#login form { background: #16213e; padding: 32px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; min-width: 300px; }
#login h2 { color: #e94560; margin-bottom: 8px; }
#login input { padding: 12px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; }
#login button { padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
#users-online { font-size: 13px; color: #888; }
</style>
</head>
<body>
<div id="login">
  <form id="loginForm">
    <h2>Welcome to Chat</h2>
    <input name="username" placeholder="Enter your name" required autofocus>
    <button type="submit">Join Chat</button>
  </form>
</div>

<div class="chat-container" style="display:none" id="chatContainer">
  <header>
    <h1>💬 Chat Room</h1>
    <div><span id="users-online">0 online</span> <span id="status">Disconnected</span></div>
  </header>
  <div id="messages"></div>
  <div class="input-area">
    <input id="msgInput" placeholder="Type a message..." autofocus>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">
import { encode, decode } from 'https://esm.sh/@msgpack/msgpack@3.1.3'

const WS_URL = `ws://${location.host}`
let ws, username = ''
const messagesEl = document.getElementById('messages')
const statusEl = document.getElementById('status')
const onlineEl = document.getElementById('users-online')
const msgInput = document.getElementById('msgInput')

function connect() {
  ws = new WebSocket(WS_URL)
  ws.binaryType = 'arraybuffer'
  ws.onopen = () => {
    statusEl.textContent = 'Connected'
    statusEl.style.color = '#4caf50'
    ws.send(encode({ type: 'join', username, timestamp: Date.now() }))
  }
  ws.onclose = () => {
    statusEl.textContent = 'Disconnected'
    statusEl.style.color = '#e94560'
  }
  ws.onmessage = (event) => {
    const msg = decode(new Uint8Array(event.data))
    const time = new Date(msg.timestamp).toLocaleTimeString()
    switch (msg.type) {
      case 'join':
        addSystem(`${msg.username} joined`)
        break
      case 'leave':
        addSystem(`${msg.username} left`)
        break
      case 'message':
        addMessage(msg.username, msg.text, time, msg.username === username)
        break
    }
    onlineEl.textContent = `${msg.users} online`
  }
}

function addSystem(text) {
  const div = document.createElement('div')
  div.className = 'msg system'
  div.textContent = text
  messagesEl.appendChild(div)
  messagesEl.scrollTop = messagesEl.scrollHeight
}

function addMessage(author, text, time, isMe) {
  const div = document.createElement('div')
  div.className = `msg ${isMe ? 'me' : 'other'}`
  div.innerHTML = `<div class="author">${author}</div>${text}<div class="time">${time}</div>`
  messagesEl.appendChild(div)
  messagesEl.scrollTop = messagesEl.scrollHeight
}

document.getElementById('loginForm').onsubmit = (e) => {
  e.preventDefault()
  username = new FormData(e.target).get('username').trim()
  if (!username) return
  document.getElementById('login').style.display = 'none'
  document.getElementById('chatContainer').style.display = 'flex'
  connect()
}

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send()
})

document.getElementById('sendBtn').onclick = send

function send() {
  const text = msgInput.value.trim()
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return
  ws.send(encode({ type: 'message', text, timestamp: Date.now() }))
  msgInput.value = ''
}
</script>
</body>
</html>
